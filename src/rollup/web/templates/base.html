<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Rollup{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='web.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ url_for('rollups.list_rollups') }}">Rollup</a>
    <nav>
      <a href="{{ url_for('rollups.list_rollups') }}">Archive</a>
      <a href="{{ url_for('sources.list_sources') }}">Sources</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='ratings.js') }}" defer></script>
</body>
</html>
