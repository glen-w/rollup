<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Rollup{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='web.css') }}">
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ url_for('rollups.list_rollups') }}">
      <img src="{{ url_for('branding', name='rollup_logo.png') }}" alt="Rollup" width="150" height="150">
    </a>
    <nav>
      <a href="{{ url_for('rollups.list_rollups') }}">Archive</a>
      <a href="{{ url_for('sources.list_sources') }}">Sources</a>
      <a href="{{ url_for('admin.admin_index') }}">Admin</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='web.js') }}" defer></script>
  <script src="{{ url_for('static', filename='ratings.js') }}" defer></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
